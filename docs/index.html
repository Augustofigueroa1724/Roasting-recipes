<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Buscador de recetas de tueste · roast.world (snapshot)</title>
<style>
  :root { --bg:#1b1410; --card:#2a201a; --ink:#f3e9df; --muted:#b09c8a; --accent:#d98a3d; --line:#3a2c22; --bad:#e06a5a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:20px 24px; border-bottom:1px solid var(--line); }
  h1 { margin:0; font-size:20px; }
  .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .wrap { display:grid; grid-template-columns: 280px 1fr; gap:0; min-height:calc(100vh - 70px); }
  .filters { padding:20px 24px; border-right:1px solid var(--line); }
  .results { padding:20px 24px; }
  label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin:14px 0 5px; }
  input[type=text], select { width:100%; padding:9px 10px; background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:8px; font-size:14px; }
  input[type=text]:focus, select:focus { outline:none; border-color:var(--accent); }
  .btn { margin-top:18px; width:100%; padding:10px; background:var(--accent); color:#1b1410; border:0; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; }
  .btn.secondary { background:transparent; color:var(--muted); border:1px solid var(--line); margin-top:8px; }
  .count { color:var(--muted); font-size:13px; }
  .resbar { display:flex; align-items:center; gap:16px; margin-bottom:14px; }
  #selall-wrap { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink); cursor:pointer; user-select:none; margin-left:auto; }
  #selall { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; }
  .card { position:relative; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:12px; cursor:pointer; transition:border-color .15s; }
  .card:hover { border-color:var(--accent); }
  .card.sel { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .card .pick { position:absolute; top:12px; right:12px; width:18px; height:18px; cursor:pointer; accent-color:var(--accent); }
  .card h3 { margin:0 0 6px; font-size:16px; }
  .tags { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
  .tag { font-size:11px; padding:3px 8px; border-radius:20px; background:#3a2c22; color:var(--ink); }
  .tag.level { background:#4a3214; color:var(--accent); }
  .metrics { display:flex; flex-wrap:wrap; gap:14px; font-size:13px; color:var(--muted); margin-top:6px; }
  .metrics b { color:var(--ink); font-weight:600; }
  .empty { color:var(--muted); padding:40px 0; text-align:center; }
  .error { background:#3a1f1a; border:1px solid var(--bad); color:#f0c4bd; padding:12px 14px; border-radius:8px; margin-bottom:14px; font-size:13px; }
  dialog { background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:12px; max-width:560px; width:90%; padding:0; }
  dialog::backdrop { background:rgba(0,0,0,.6); }
  .cmp-page { position:fixed; inset:0; background:var(--bg); z-index:100; overflow:auto; display:none; }
  .cmp-page.show { display:block; }
  .cmp-page .dlg-head { position:sticky; top:0; background:var(--bg); padding:18px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; z-index:1; }
  .cmp-page .dlg-body { padding:18px 24px; max-width:1100px; margin:0 auto; }
  .back-btn { background:transparent; color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:8px 14px; cursor:pointer; font-size:14px; }
  .back-btn:hover { border-color:var(--accent); color:var(--accent); }
  .dlg-head { padding:18px 20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .dlg-body { padding:18px 20px; }
  .dlg-body table { width:100%; border-collapse:collapse; font-size:13px; }
  .dlg-body td { padding:5px 0; border-bottom:1px solid var(--line); }
  .dlg-body td:first-child { color:var(--muted); width:45%; }
  .dlg-body a { color:var(--accent); }
  .x { background:none; border:0; color:var(--muted); font-size:20px; cursor:pointer; }
  .note { font-size:11px; color:var(--muted); margin-top:4px; font-style:italic; }
  .cmpbar { position:fixed; bottom:0; left:0; right:0; background:#221913; border-top:1px solid var(--accent); padding:12px 24px; display:none; justify-content:space-between; align-items:center; z-index:50; }
  .cmpbar.show { display:flex; }
  .cmpbar .btn { width:auto; margin-top:0; padding:9px 16px; display:inline-block; }
  .legend { display:flex; flex-wrap:wrap; gap:14px; margin:6px 0 12px; font-size:13px; }
  .legend span { display:flex; align-items:center; gap:6px; }
  .legend .leg-item { cursor:pointer; user-select:none; transition:opacity .12s; }
  .legend a.leg-link { color:inherit; text-decoration:none; }
  .legend a.leg-link:hover { color:var(--accent); text-decoration:underline; }
  .legend .leg-deg { background:#4a3214; color:var(--accent); padding:1px 7px; border-radius:20px; font-size:11px; }
  .legend .leg-dl { color:var(--muted); font-size:11px; }
  .legend .leg-x { color:var(--muted); font-weight:700; padding:0 2px; border-radius:4px; }
  .legend .leg-x:hover { color:var(--bad); background:#3a1f1a; }
  .legend i { width:14px; height:3px; display:inline-block; border-radius:2px; }
  .summary { background:#221913; border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:13px; margin-top:10px; }
  .summary:empty { display:none; }
  .summary .out { color:var(--accent); font-weight:600; }
  .tabs { display:flex; gap:8px; margin-bottom:10px; }
  .tabs button { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:6px; padding:5px 12px; cursor:pointer; font-size:13px; }
  .tabs button.on { background:var(--accent); color:#1b1410; border-color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>☕ Buscador de recetas de tueste</h1>
  <div class="sub" id="hdrsub">Snapshot del catálogo de la comunidad de roast.world.</div>
</header>

<div class="wrap">
  <aside class="filters">
    <label for="q">Texto libre</label>
    <input type="text" id="q" placeholder="p.ej. supremo, yirgacheffe…">
    <label for="country">Origen / país</label>
    <select id="country"><option value="">Todos</option></select>
    <label for="process">Proceso</label>
    <select id="process"><option value="">Todos</option></select>
    <label for="level">Nivel de tueste</label>
    <select id="level"><option value="">Todos</option></select>
    <label for="device">Dispositivo</label>
    <select id="device"><option value="">Todos</option></select>
    <label for="sortBy">Ordenar por</label>
    <select id="sortBy">
      <option value="popularity">Popularidad (veces guardada)</option>
      <option value="name">Nombre (A–Z)</option>
    </select>
    <button class="btn" id="searchBtn">Buscar</button>
    <button class="btn secondary" id="clearBtn">Limpiar filtros</button>
  </aside>

  <main class="results">
    <div id="msg"></div>
    <div class="resbar">
      <span class="count" id="count">Cargando…</span>
      <label id="selall-wrap" style="display:none"><input type="checkbox" id="selall"> Seleccionar todo</label>
    </div>
    <div id="list"></div>
  </main>
</div>

<dialog id="detail">
  <div class="dlg-head"><strong id="d-title">Receta</strong><button class="x" onclick="document.getElementById('detail').close()">×</button></div>
  <div class="dlg-body" id="d-body"></div>
</dialog>

<div id="cmp" class="cmp-page">
  <div class="dlg-head"><strong id="cmp-title">Comparativa de recetas</strong><button class="back-btn" onclick="closeCmp()">← Volver</button></div>
  <div class="dlg-body">
    <div class="tabs">
      <button id="tab-power" class="on" onclick="setMetric('power')">Power (1–9)</button>
      <button id="tab-temp" onclick="setMetric('beanTemp')">Temperatura grano</button>
    </div>
    <div class="legend" id="cmp-legend"></div>
    <div id="cmp-chart"></div>
    <div class="summary" id="cmp-summary"></div>
  </div>
</div>

<div class="cmpbar" id="cmpbar">
  <span class="lbl"><b id="cmp-count">0</b> recetas seleccionadas para comparar</span>
  <span>
    <button class="btn secondary" onclick="clearSelection()">Quitar selección</button>
    <button class="btn" id="cmp-go">Comparar selección</button>
  </span>
</div>

<script>
const $ = id => document.getElementById(id);
const FILTERS = ["country","process","level","device"];
let ALL = [];   // todas las recetas del snapshot
const ROAST_DEGREE_LABELS = {0:"Very light (Cinnamon)",1:"Light (City)",2:"Medium light (City+)",3:"Medium (Full city)",4:"Medium dark (Full city+)",5:"Dark (Vienna)",6:"Very dark (French)"};
function showError(t){ $("msg").innerHTML = `<div class="error">⚠️ ${t}</div>`; }

async function loadData() {
  try {
    const raw = await (await fetch("data/recipes.json")).json();
    // formato columnar {fields, rows} -> objetos; derivar roastLevel y url
    const F = raw.fields;
    ALL = raw.rows.map(row => {
      const o = {}; F.forEach((f,i)=>o[f]=row[i]);
      o.roastLevel = ROAST_DEGREE_LABELS[o.roastDegree] || null;
      // roast.world enruta como /{handle}/recipes/{uid}; sin handle cae al
      // formato antiguo (da error, pero es lo único disponible).
      o.url = o.handle ? "https://roast.world/" + o.handle + "/recipes/" + o.uid
                       : "https://roast.world/recipes/" + o.uid;
      return o;
    });
    const f = await (await fetch("data/facets.json")).json();
    FILTERS.forEach(k => (f[k]||[]).forEach(v => { const o=document.createElement("option"); o.value=v; o.textContent=v; $(k).appendChild(o); }));
    try { const m = await (await fetch("data/meta.json")).json();
      $("hdrsub").textContent = `Snapshot de ${m.count} recetas populares de la comunidad de roast.world${m.generatedAt?` · ${m.generatedAt}`:""}.`; } catch(e){}
  } catch (e) { showError("No se pudo cargar el snapshot de datos: " + e.message); }
}

function fmtTime(s){ if(s==null) return "—"; const m=Math.floor(s/60),x=Math.round(s%60); return `${m}:${String(x).padStart(2,"0")}`; }

const MAX_RENDER = 120;
function doSearch() {
  const terms = $("q").value.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const fc = {}; FILTERS.forEach(k => fc[k] = $(k).value);
  let rows = ALL.filter(r => {
    const name = (r.name||"").toLowerCase();
    if (terms.length && !terms.every(t => name.includes(t))) return false;  // todas las palabras
    if (fc.country && r.country !== fc.country) return false;
    if (fc.process && r.process !== fc.process) return false;
    if (fc.level && r.roastLevel !== fc.level) return false;
    if (fc.device && r.deviceType !== fc.device) return false;
    return true;
  });
  if ($("sortBy").value === "name") rows.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  else rows.sort((a,b)=>(b.downloadCount||0)-(a.downloadCount||0));
  render(rows);
}

function render(allRows) {
  const total = allRows.length;
  const rows = allRows.slice(0, MAX_RENDER);
  $("count").textContent = total === 0 ? "0 recetas"
    : (total > rows.length ? `${rows.length} de ${total.toLocaleString("es")} recetas` : `${total} receta${total===1?"":"s"}`);
  const list = $("list");
  if (!rows.length) { list.innerHTML = `<div class="empty">Sin resultados para estos criterios.</div>`; $("selall-wrap").style.display="none"; CURRENT=[]; syncSelAll(); return; }
  list.innerHTML = rows.map(r => {
    const tags=[];
    if (r.country) tags.push(`<span class="tag">${r.country}</span>`);
    if (r.process) tags.push(`<span class="tag">${r.process}</span>`);
    if (r.roastLevel) tags.push(`<span class="tag level">${r.roastLevel}</span>`);
    const checked = SEL.has(r.uid)?"checked":""; const selCls = SEL.has(r.uid)?" sel":"";
    return `<div class="card${selCls}" id="card-${r.uid}" onclick="openDetail('${r.uid}')">
      <input type="checkbox" class="pick" ${checked} title="Seleccionar para comparar" onclick="event.stopPropagation(); toggleSel('${r.uid}', this.checked)">
      <h3>${r.name||"(sin nombre)"}</h3>
      <div class="tags">${tags.join("")}</div>
      <div class="metrics">
        ${r.weight?`<span>⚖️ <b>${r.weight} g</b></span>`:""}
        <span>📌 <b>${(r.downloadCount||0).toLocaleString("es")}</b> guardada${r.downloadCount===1?"":"s"}</span>
        ${r.deviceType?`<span>${r.deviceType}</span>`:""}
        ${r.ref?"":`<span title="sin perfil para comparar">· sin perfil</span>`}
      </div></div>`;
  }).join("");
  rows.forEach(r => { NAMES.set(r.uid, r.name||r.uid); META.set(r.uid, r); });
  CURRENT = rows.map(r => r.uid);
  $("selall-wrap").style.display = "flex"; syncSelAll();
}

function openDetail(uid) {
  const r = META.get(uid) || {};
  $("d-title").textContent = r.name || "Receta";
  const rows = [
    ["Origen / país", r.country||"—"],
    ["Proceso", r.process||"—"],
    ["Nivel de tueste", r.roastLevel||(r.roastDegree!=null?"grado "+r.roastDegree:"—")],
    ["Peso", r.weight!=null?r.weight+" g":"—"],
    ["Veces guardada (stash)", (r.downloadCount||0).toLocaleString("es")],
    ["Dispositivo", r.deviceType||"—"],
    ["Ver en roast.world", r.url?`<a href="${r.url}" target="_blank" rel="noopener">abrir receta ↗</a>`:"—"],
  ];
  $("d-body").innerHTML = "<table>"+rows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join("")+"</table>";
  $("detail").showModal();
}

// ---- selección ----
const SEL=new Set(), NAMES=new Map(), META=new Map(); let CURRENT=[];
function toggleSel(uid,on){ if(on)SEL.add(uid);else SEL.delete(uid); const c=$("card-"+uid); if(c)c.classList.toggle("sel",on); updateBar(); syncSelAll(); }
function clearSelection(){ SEL.forEach(uid=>{const c=$("card-"+uid); if(c){c.classList.remove("sel"); const cb=c.querySelector(".pick"); if(cb)cb.checked=false;}}); SEL.clear(); updateBar(); syncSelAll(); }
function updateBar(){ $("cmp-count").textContent=SEL.size; $("cmpbar").classList.toggle("show",SEL.size>0); }
function syncSelAll(){ const b=$("selall"); if(!CURRENT.length){b.checked=false;b.indeterminate=false;return;} const n=CURRENT.filter(u=>SEL.has(u)).length; b.checked=n===CURRENT.length; b.indeterminate=n>0&&n<CURRENT.length; }
$("selall").onchange=function(){ const on=this.checked; CURRENT.forEach(uid=>{ if(on)SEL.add(uid);else SEL.delete(uid); const c=$("card-"+uid); if(c){c.classList.toggle("sel",on); const cb=c.querySelector(".pick"); if(cb)cb.checked=on;} }); updateBar(); syncSelAll(); };

// ---- comparativa: el perfil se baja del log de Firebase Storage AL VUELO ----
const COLORS=["#d98a3d","#5aa9e0","#7fc97f","#e06a5a","#c792ea","#e0c84a","#56c9c0","#e08bbf"];
const STORAGE = ref => `https://firebasestorage.googleapis.com/v0/b/testaillio.appspot.com/o/roasts%2F${ref}.json?alt=media`;
const CTRL = {0:"power",1:"fan",2:"drum"};
const PROFCACHE = new Map();
let CMP={profiles:[],metric:"power"}, PINNED=null;

// reconstruye el perfil (power/fan/drum + curva de temperatura + hitos) desde el log
function parseLog(log, r){
  const sr = log.sampleRate || 1;
  const series = {power:[],fan:[],drum:[]};
  ((log.actions&&log.actions.actionTimeList)||[]).forEach(a=>{
    const lab=CTRL[a.ctrlType]; const idx=a.index, val=a.value;
    if(lab && idx!=null && val!=null) series[lab].push([Math.round(idx/sr*10)/10, +val]);
  });
  for(const k in series) series[k].sort((x,y)=>x[0]-y[0]);
  const bt=log.beanTemperature||[], stride=Math.max(1,Math.round(5*sr)), beanTemp=[];
  for(let i=0;i<bt.length;i+=stride){ if(typeof bt[i]==="number") beanTemp.push([Math.round(i/sr*10)/10, Math.round(bt[i]*100)/100]); }
  const ms=idx=>(typeof idx==="number"&&idx>0)?Math.round(idx/sr*10)/10:null;
  return { uid:r.uid, name:r.name, country:r.country, process:r.process,
    roastDegree:r.roastDegree, roastLevel:r.roastLevel, weight:r.weight, downloadCount:r.downloadCount, series, beanTemp,
    milestones:{ yellowing:ms(log.indexYellowingStart), firstCrackStart:ms(log.indexFirstCrackStart), firstCrackEnd:ms(log.indexFirstCrackEnd) },
    duration: log.totalRoastTime || (sr?bt.length/sr:0), url:r.url };
}

async function getProfile(uid){
  if(PROFCACHE.has(uid)) return PROFCACHE.get(uid);
  const r=META.get(uid)||{}; if(!r.ref) throw new Error("sin ref");
  const resp=await fetch(STORAGE(r.ref)); if(!resp.ok) throw new Error("log no disponible");
  const prof=parseLog(await resp.json(), r); PROFCACHE.set(uid,prof); return prof;
}

function openCmp(){ $("cmp").classList.add("show"); document.body.style.overflow="hidden"; window.scrollTo(0,0); }
function closeCmp(){ $("cmp").classList.remove("show"); document.body.style.overflow=""; }
async function runCompare(){
  const uids=[...SEL]; if(!uids.length) return;
  PINNED=null;
  $("cmp-title").textContent="Comparando "+uids.length+" recetas…";
  $("cmp-chart").innerHTML="Descargando perfiles de tueste…"; $("cmp-legend").innerHTML=""; $("cmp-summary").innerHTML="";
  openCmp();
  const profiles=[], errors=[];
  await Promise.all(uids.map(async uid=>{ try{ profiles.push(await getProfile(uid)); }catch(e){ errors.push(uid); } }));
  CMP.profiles=profiles;
  $("cmp-title").textContent="Comparativa · "+profiles.length+" recetas";
  $("cmp-summary").innerHTML = errors.length ? `⚠️ ${errors.length} receta(s) sin perfil disponible.` : "";
  if(!profiles.length){ $("cmp-chart").innerHTML="<div class='note'>Ninguna de las seleccionadas tiene perfil disponible.</div>"; return; }
  setMetric(CMP.metric);
}

function setMetric(m){ CMP.metric=m; $("tab-power").classList.toggle("on",m==="power"); $("tab-temp").classList.toggle("on",m==="beanTemp"); drawChart(); }
function seriesOf(p,m){ return m==="power"?(p.series&&p.series.power)||[]:p.beanTemp||[]; }
function shortLevel(rl){ if(!rl) return ""; const m=rl.match(/\(([^)]+)\)/); return m?m[1]:rl; }

function drawChart(){
  const W=820,H=360,pad=44,m=CMP.metric;
  const all=CMP.profiles.map(p=>seriesOf(p,m)).filter(s=>s.length);
  if(!all.length){ $("cmp-chart").innerHTML="<div class='note'>Sin datos de "+m+".</div>"; $("cmp-legend").innerHTML=""; return; }
  const maxT=Math.max(...all.flat().map(p=>p[0]),1);
  let minY=Math.min(...all.flat().map(p=>p[1])), maxY=Math.max(...all.flat().map(p=>p[1]));
  if(m==="power"){minY=0;maxY=9;}else{minY=Math.floor(minY/10)*10;maxY=Math.ceil(maxY/10)*10;}
  const x=t=>pad+(t/maxT)*(W-pad-10), y=v=>H-pad-((v-minY)/(maxY-minY||1))*(H-pad-14), step=m==="power";
  const parts=[];
  for(let i=0;i<=5;i++){ const gy=pad+i*(H-pad-14)/5, val=(maxY-i*(maxY-minY)/5);
    parts.push(`<line x1="${pad}" y1="${gy}" x2="${W-10}" y2="${gy}" stroke="#3a2c22"/>`);
    parts.push(`<text x="6" y="${gy+4}" fill="#b09c8a" font-size="11">${Math.round(val)}</text>`); }
  for(let s=0;s<=maxT;s+=Math.max(60,Math.round(maxT/6/60)*60))
    parts.push(`<text x="${x(s)}" y="${H-pad+16}" fill="#b09c8a" font-size="11" text-anchor="middle">${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}</text>`);
  CMP.profiles.forEach((p,i)=>{ const fc=p.milestones&&p.milestones.firstCrackStart;
    if(fc&&fc<=maxT) parts.push(`<line class="cmpfc" data-i="${i}" x1="${x(fc)}" y1="${pad}" x2="${x(fc)}" y2="${H-pad}" stroke="${COLORS[i%COLORS.length]}" stroke-dasharray="3 3" opacity="0.4"/>`); });
  CMP.profiles.forEach((p,i)=>{ const s=seriesOf(p,m); if(!s.length) return; const col=COLORS[i%COLORS.length]; let d="";
    s.forEach((pt,j)=>{ const px=x(pt[0]),py=y(pt[1]); if(j===0)d+=`M ${px} ${py}`; else if(step)d+=` H ${px} V ${py}`; else d+=` L ${px} ${py}`; });
    parts.push(`<path class="cmphit" data-i="${i}" d="${d}" fill="none" stroke="transparent" stroke-width="12" style="cursor:pointer" onmouseenter="highlight(${i})" onmouseleave="highlight(PINNED)" onclick="openRecipe(${i})"><title>${(p.name||p.uid)} · clic para abrir en roast.world ↗</title></path>`);
    parts.push(`<path class="cmpline" data-i="${i}" d="${d}" fill="none" stroke="${col}" stroke-width="2" style="pointer-events:none"/>`); });
  parts.push(`<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}" stroke="#6b5544"/>`);
  parts.push(`<line x1="${pad}" y1="${H-pad}" x2="${W-10}" y2="${H-pad}" stroke="#6b5544"/>`);
  parts.push(`<text x="${W/2}" y="${H-6}" fill="#b09c8a" font-size="11" text-anchor="middle">tiempo (min:seg) · líneas punteadas = 1er crack</text>`);
  $("cmp-chart").innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${parts.join("")}</svg>`;
  $("cmp-legend").innerHTML=CMP.profiles.map((p,i)=>
    `<span class="leg-item" data-i="${i}" onmouseenter="highlight(${i})" onmouseleave="highlight(PINNED)" onclick="pin(${i})" title="Clic para fijar el resaltado">
       <i style="background:${COLORS[i%COLORS.length]}"></i><a class="leg-link" href="${p.url||'#'}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Abrir receta en roast.world ↗">${p.name||p.uid}</a>
       ${p.roastLevel?`<small class="leg-deg">${shortLevel(p.roastLevel)}</small>`:""}
       ${p.downloadCount>0?`<small class="leg-dl" title="veces guardada (stash)">📌 ${p.downloadCount.toLocaleString("es")}</small>`:""}
       <b class="leg-x" title="Quitar del gráfico" onclick="event.stopPropagation(); removeProfile(${i})">×</b></span>`).join("");
  highlight(PINNED);
}
function highlight(idx){
  document.querySelectorAll("#cmp-chart .cmpline").forEach(el=>{const i=+el.dataset.i; el.setAttribute("stroke-width",idx===i?3.5:2); el.setAttribute("opacity",idx==null||idx===i?1:0.18);});
  document.querySelectorAll("#cmp-chart .cmpfc").forEach(el=>{const i=+el.dataset.i; el.setAttribute("opacity",idx==null?0.4:(idx===i?0.9:0.08));});
  document.querySelectorAll("#cmp-legend .leg-item").forEach(el=>{el.style.opacity=(idx==null||+el.dataset.i===idx)?1:0.4; el.style.fontWeight=(+el.dataset.i===idx)?600:400;});
}
function pin(idx){ PINNED=(PINNED===idx)?null:idx; highlight(PINNED); }
function openRecipe(idx){ const p=CMP.profiles[idx]; if(p&&p.url) window.open(p.url,"_blank","noopener"); }
function removeProfile(idx){ const p=CMP.profiles[idx]; if(!p)return; CMP.profiles.splice(idx,1); SEL.delete(p.uid);
  const c=$("card-"+p.uid); if(c){c.classList.remove("sel"); const cb=c.querySelector(".pick"); if(cb)cb.checked=false;}
  PINNED=null; updateBar(); syncSelAll(); if(!CMP.profiles.length){closeCmp();return;}
  $("cmp-title").textContent="Comparativa · "+CMP.profiles.length+" recetas"; drawChart(); }

$("cmp-go").onclick=runCompare;
document.addEventListener("keydown",e=>{ if(e.key==="Escape" && $("cmp").classList.contains("show")) closeCmp(); });
$("searchBtn").onclick=doSearch;
$("q").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
FILTERS.forEach(k=>$(k).addEventListener("change",doSearch));
$("sortBy").addEventListener("change",doSearch);
$("clearBtn").onclick=()=>{ $("q").value=""; FILTERS.forEach(k=>$(k).value=""); doSearch(); };

loadData().then(doSearch);
</script>
</body>
</html>
